<section id="experience" class="section-container">
  <h2 class="section-title" data-aos="fade-up">Experience</h2>

  <div class="space-y-6">
    @for (exp of experiences; track exp.company) {
    <div class="group relative pl-6 pb-8 border-l-2 border-slate last:pb-0 cursor-default" data-aos="fade-up"
      [attr.data-aos-delay]="$index * 100">
      <!-- Timeline dot -->
      <div
        class="absolute -top-3 w-5 h-5 rounded-full bg-green-400 border-2 border-black group-hover:scale-125 transition-transform duration-300"
        style="left: -11px">
      </div>

      <!-- Card content -->
      <div
        class="p-6 bg-gradient-to-br from-slate-900/30 to-slate-900/10 group-hover:border-green-400/50 transition-all duration-300 group-hover:shadow-lg group-hover:shadow-green-400/10">
        <!-- Header: Position & Company -->
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-2">
          <h3 class="text-xl font-semibold text-lightest-slate group-hover:text-green-400 transition-colors">
            {{ exp.position }}
          </h3>
          <span class="text-sm font-mono text-green-400 px-3 py-1 rounded-full bg-green-400/10 w-fit whitespace-nowrap">
            {{ exp.startDate }} - {{ exp.endDate }}
          </span>
        </div>

        <!-- Company -->
        <p class="text-base text-slate mb-4">
          <a [href]="exp.companyUrl" target="_blank" rel="noopener noreferrer"
            class="font-semibold text-light-slate hover:text-green-400 transition-colors border-b border-green-400/30 hover:border-green-400">
            {{ exp.company }}
          </a>
        </p>

        <!-- Achievements -->
        <ul class="space-y-2">
          @for (achievement of exp.achievements; track achievement) {
          <li class="flex gap-3 text-slate text-sm sm:text-base">
            <span class="text-green-400 font-bold mt-0.5 flex-shrink-0">›</span>
            <span>{{ achievement }}</span>
          </li>
          }
        </ul>
      </div>
    </div>
    }
  </div>
</section>
