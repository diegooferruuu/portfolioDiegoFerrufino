<section id="projects" class="section-container">
  <div class="flex items-center gap-3 mb-12" data-aos="fade-up">
    <h2 class="section-title">Things I've worked on</h2>
  </div>

  <div class="space-y-20">
    @for (project of projects; track project; let i = $index) {
    <div class="relative group" [attr.data-aos]="$index % 2 === 0 ? 'fade-right' : 'fade-left'">
      <div
        class="absolute inset-0 bg-gradient-to-r from-green-400/0 via-green-400/5 to-green-400/0 rounded-2xl pointer-events-none group-hover:from-green-400/10 group-hover:via-green-400/10 group-hover:to-green-400/10 transition-all duration-300">
      </div>

      <div class="relative grid md:grid-cols-12 gap-6 lg:gap-8 items-stretch">
        <!-- Image Section -->
        <div class="md:col-span-7">
          <div class="relative h-[280px] md:h-[320px] lg:h-[380px] rounded-xl overflow-hidden">
            <img [src]="project.image" [alt]="project.title + ' - ' + project.description[0] + ' project screenshot'"
              loading="lazy"
              class="w-full h-full object-cover brightness-75 group-hover:brightness-90 transition-all duration-300" />
            <div
              class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-40 group-hover:opacity-20 transition-opacity duration-300">
            </div>

          </div>
        </div>

        <!-- Content Section -->
        <div class="md:col-span-5 flex flex-col justify-between py-4 md:py-0">
          <div>
            <h3
              class="text-3xl md:text-2xl lg:text-3xl font-bold mb-6 text-white group-hover:text-green-400 transition-colors duration-300">
              {{ project.title }}
            </h3>

            <!-- Description Box -->
            <div
              class="bg-gray-800/40 p-5 md:p-6 mb-6 backdrop-blur-sm group-hover:border-green-400/50 group-hover:rounded-lg transition-colors duration-300">
              <ul class="space-y-3">
                @for (desc of project.description; track desc) {
                <li class="text-gray-300 text-sm md:text-base leading-relaxed flex gap-3">
                  <span class="text-green-400 font-bold flex-shrink-0">•</span>
                  <span>{{ desc }}</span>
                </li>
                }
              </ul>
            </div>
          </div>

          <!-- Tech Stack -->
          <ul class="flex flex-wrap gap-3 text-sm font-mono text-slate">
            @for (tech of project.techStack; track tech) {
            <li>{{ tech }}</li>
            }
          </ul>
        </div>
      </div>
    </div>
    }
  </div>
</section>
